<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento e Sensores Inteligentes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🌱 Monitoramento e Sensores Inteligentes</h1>
        <p>Tecnologia para um agro mais eficiente e sustentável.</p>
    </header>

    <main class="container">

        <div class="card">
            <h2>🌡️ Temperatura</h2>
            <p id="temperatura">-- °C</p>
        </div>

        <div class="card">
            <h2>💧 Umidade</h2>
            <p id="umidade">-- %</p>
        </div>

        <div class="card">
            <h2>🌬️ Qualidade do Ar</h2>
            <p id="ar">--</p>
        </div>

        <button onclick="atualizarSensores()">
            Atualizar Sensores
        </button>

    </main>

    <footer>
        <p>Projeto Educacional - Sensores Inteligentes</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
